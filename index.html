<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🇯🇵 大阪・神戶・名古屋 2026</title>
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #eeecea;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.13);
  --text: #1c1b18;
  --text2: #6b6560;
  --text3: #a8a39d;
  --accent: #1a5cff;
  --accent-bg: #edf1ff;
  --green: #187a45;
  --green-bg: #e7f4ed;
  --amber: #9a6000;
  --amber-bg: #fef6e4;
  --purple: #6a3fa0;
  --purple-bg: #f2edfa;
  --pink: #ad2f5e;
  --pink-bg: #fceef4;
  --red: #c0392b;
  --red-bg: #fdf0ef;
  --tbd-border: #d4c5a9;
  --r: 12px;
  --r-sm: 8px;
  --nav: 62px;
  --font: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh}
.app{max-width:480px;margin:0 auto;padding-bottom:calc(var(--nav) + 20px)}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);background:rgba(255,255,255,.96);backdrop-filter:blur(14px);border-top:.5px solid var(--border);display:flex;z-index:100;max-width:480px;margin:0 auto}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;color:var(--text3);font-size:10px;font-family:var(--font);cursor:pointer;padding:0;transition:color .15s}
.bnav-item.on{color:var(--accent)}
.bnav-item svg{width:22px;height:22px;stroke-width:1.7}

/* ── SECTIONS ── */
.sec{display:none;padding:0 14px}
.sec.on{display:block}

/* ── HERO ── */
.hero{padding:18px 14px 10px}
.hero-title{font-size:21px;font-weight:750;letter-spacing:-.4px}
.hero-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}
.pill{background:var(--surface2);border-radius:20px;padding:2px 9px;font-size:11px;color:var(--text2)}
.pill.hi{background:var(--accent-bg);color:var(--accent)}

/* ── STAT ROW ── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:0 14px 14px}
.sc{background:var(--surface);border-radius:var(--r-sm);padding:10px 11px;border:.5px solid var(--border)}
.sc-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.sc-v{font-size:18px;font-weight:700;color:var(--text)}
.sc-s{font-size:10px;color:var(--text3);margin-top:1px}

/* ── DAY BLOCK ── */
.day{margin-bottom:18px}
.day-head{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.day-num{background:var(--text);color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.3px}
.day-info-name{font-size:14px;font-weight:650;color:var(--text)}
.day-info-date{font-size:11px;color:var(--text3);margin-top:1px}

/* ── TIMELINE ── */
.tl{position:relative;padding-left:20px}
.tl::before{content:'';position:absolute;left:5px;top:10px;bottom:10px;width:1px;background:var(--border2)}
.ev{position:relative;margin-bottom:6px}
.ev-dot{position:absolute;left:-16px;top:12px;width:8px;height:8px;border-radius:50%;background:var(--border2);border:2px solid var(--bg)}
.ev-dot.flight,.ev-dot.transport{background:var(--purple)}
.ev-dot.hotel{background:var(--accent)}
.ev-dot.food{background:var(--amber)}
.ev-dot.sight{background:var(--green)}
.ev-dot.event{background:var(--pink)}
.ev-dot.tbd{background:var(--tbd-border)}

.ev-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r-sm);cursor:pointer;transition:border-color .15s;user-select:none}
.ev-card.tbd{background:#faf8f4;border-color:var(--tbd-border);border-style:dashed}
.ev-card.open{border-color:var(--border2)}
.ev-top{display:flex;align-items:center;gap:7px;padding:9px 10px}
.ev-time{font-size:11px;color:var(--text3);min-width:36px;flex-shrink:0}
.ev-name{font-size:13px;font-weight:600;color:var(--text);flex:1;line-height:1.3}
.ev-card.tbd .ev-name{color:var(--text2)}
.ev-badge{font-size:10px;padding:2px 6px;border-radius:20px;flex-shrink:0;font-weight:500;white-space:nowrap}
.b-flight,.b-transport{background:var(--purple-bg);color:var(--purple)}
.b-hotel{background:var(--accent-bg);color:var(--accent)}
.b-food{background:var(--amber-bg);color:var(--amber)}
.b-sight{background:var(--green-bg);color:var(--green)}
.b-event{background:var(--pink-bg);color:var(--pink)}
.b-tbd{background:var(--surface2);color:var(--text3);border:.5px dashed var(--border2)}
.ev-arr{font-size:13px;color:var(--text3);flex-shrink:0;transition:transform .18s;line-height:1}
.ev-card.open .ev-arr{transform:rotate(90deg)}

.ev-body{display:none;padding:0 10px 10px;border-top:.5px solid var(--border)}
.ev-card.open .ev-body{display:block}
.ev-desc{font-size:12px;color:var(--text2);line-height:1.65;padding-top:8px}
.map-btn{display:inline-flex;align-items:center;gap:4px;margin-top:7px;font-size:12px;background:var(--green-bg);color:var(--green);padding:5px 10px;border-radius:20px;text-decoration:none;font-weight:600}
.note-field{width:100%;margin-top:8px;font-size:12px;padding:7px 8px;border:.5px solid var(--border2);border-radius:var(--r-sm);resize:none;font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5}
.note-field:focus{outline:none;border-color:var(--accent)}

/* ── HOTEL PICKER ── */
.hotel-pick{padding-top:8px}
.hotel-opts{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.hopt{border:1px solid var(--border2);border-radius:var(--r-sm);padding:8px 9px;cursor:pointer;background:var(--surface);transition:all .15s}
.hopt.on{border-color:var(--accent);border-width:1.5px;background:var(--accent-bg)}
.hopt-name{font-size:12px;font-weight:650;color:var(--text);line-height:1.3;margin-bottom:2px}
.hopt.on .hopt-name{color:var(--accent)}
.hopt-sub{font-size:10px;color:var(--text3)}
.hopt-map{display:block;font-size:11px;color:var(--accent);margin-top:4px;text-decoration:none}
.hotel-status{font-size:12px;font-weight:600}
.hotel-status.ok{color:var(--green)}
.hotel-status.warn{color:var(--red)}

/* ── ADD EVENT INLINE ── */
.add-ev-row{margin-top:8px}
.add-ev-toggle{display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:600;color:var(--accent);background:var(--accent-bg);border:1px dashed var(--accent);border-radius:var(--r-sm);cursor:pointer;font-family:var(--font);padding:10px;width:100%;margin-top:6px;transition:background .15s}
.add-ev-toggle:active{background:#dce6ff}
.add-ev-form{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r-sm);padding:11px;margin-top:6px;display:none}
.add-ev-form.on{display:block}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px}
.fg-full{grid-column:span 2}
input.fi,select.fs{width:100%;font-size:13px;padding:8px 9px;border:.5px solid var(--border2);border-radius:var(--r-sm);font-family:var(--font);background:var(--bg);color:var(--text);-webkit-appearance:none}
input.fi:focus,select.fs:focus{outline:none;border-color:var(--accent)}
.fa{display:flex;gap:7px}
.btn{font-size:13px;padding:8px 16px;border-radius:var(--r-sm);border:.5px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;font-family:var(--font);font-weight:600;transition:opacity .15s}
.btn:active{opacity:.75}
.btn-p{background:var(--text);color:#fff;border-color:transparent}

/* ── CHECKLIST ── */
.cg{background:var(--surface);border-radius:var(--r);border:.5px solid var(--border);overflow:hidden;margin-bottom:11px}
.cg-head{display:flex;align-items:center;justify-content:space-between;padding:12px 13px 9px;border-bottom:.5px solid var(--border)}
.cg-title{font-size:13px;font-weight:650;color:var(--text)}
.cg-prog{font-size:12px;color:var(--text3)}
.ci{display:flex;align-items:flex-start;gap:10px;padding:8px 13px;border-bottom:.5px solid var(--border)}
.ci:last-of-type{border-bottom:none}
.ci-cb{width:16px;height:16px;flex-shrink:0;margin-top:1px;cursor:pointer;accent-color:var(--accent)}
.ci-text{flex:1}
.ci-label{font-size:13px;color:var(--text);line-height:1.4}
.ci-label.done{text-decoration:line-through;color:var(--text3)}
.ci-sub{font-size:11px;color:var(--text3);margin-top:2px}
.ci-add{display:flex;gap:7px;padding:9px 13px}
.ci-add-in{flex:1;font-size:13px;padding:7px 9px;border:.5px solid var(--border2);border-radius:var(--r-sm);font-family:var(--font);background:var(--bg);color:var(--text)}
.ci-add-in:focus{outline:none}

/* ── BUDGET DASHBOARD ── */
.bboard{background:var(--text);color:#fff;border-radius:var(--r);padding:16px;margin-bottom:12px}
.bboard-label{font-size:10px;opacity:.5;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.bboard-jpy{font-size:34px;font-weight:800;letter-spacing:-1.5px;line-height:1}
.bboard-ntd{font-size:13px;opacity:.55;margin-top:3px;margin-bottom:12px}
.bboard-cats{display:flex;gap:5px;flex-wrap:wrap}
.bboard-cat{background:rgba(255,255,255,.13);border-radius:20px;padding:3px 9px;font-size:11px}
.bboard-cat em{opacity:.6;font-style:normal}

/* ── WALLETS ── */
.wallets{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
.wcard{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r-sm);padding:10px 11px}
.wcard-name{font-size:10px;color:var(--text3);margin-bottom:3px}
.wcard-bal{font-size:16px;font-weight:700;color:var(--text)}
.wcard-bal2{font-size:10px;color:var(--text3);margin-top:2px}
.wcard-in-row{display:flex;align-items:center;gap:4px;margin-top:6px}
.wcard-in{flex:1;font-size:12px;padding:4px 7px;border:.5px solid var(--border2);border-radius:6px;font-family:var(--font);background:var(--bg);color:var(--text)}
.wcard-in:focus{outline:none}
.wcard-unit{font-size:10px;color:var(--text3)}

/* ── EXPENSE LIST ── */
.exp-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.exp-hd-title{font-size:14px;font-weight:650;color:var(--text)}
.scan-btn{display:flex;align-items:center;gap:4px;font-size:12px;background:var(--amber-bg);color:var(--amber);padding:6px 11px;border-radius:20px;border:.5px solid var(--amber);cursor:pointer;font-family:var(--font);font-weight:600}

.ecard{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r-sm);margin-bottom:6px;overflow:hidden}
.erow{display:flex;align-items:center;gap:8px;padding:9px 11px}
.eavatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.emid{flex:1;min-width:0}
.ename{font-size:13px;font-weight:500;color:var(--text)}
.emeta{font-size:11px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:5px}
.ctag{font-size:10px;padding:1px 6px;border-radius:20px;font-weight:600}
.ct-食{background:var(--amber-bg);color:var(--amber)}
.ct-樂{background:var(--pink-bg);color:var(--pink)}
.ct-住{background:var(--accent-bg);color:var(--accent)}
.ct-行{background:var(--purple-bg);color:var(--purple)}
.ct-必須{background:var(--red-bg);color:var(--red)}
.ct-用品{background:var(--green-bg);color:var(--green)}
.ct-禮{background:var(--surface2);color:var(--text2)}
.eamts{text-align:right;flex-shrink:0}
.ejpy{font-size:13px;font-weight:700;color:var(--text)}
.entd{font-size:10px;color:var(--text3)}
.edel{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:0 0 0 3px;line-height:1;flex-shrink:0}

.total-bar{display:flex;justify-content:space-between;align-items:flex-end;padding:11px 13px;background:var(--surface);border-radius:var(--r-sm);border:.5px solid var(--border);margin-top:4px}
.total-l{font-size:13px;color:var(--text2);font-weight:500}
.total-jpy{font-size:16px;font-weight:800;color:var(--text)}
.total-ntd{font-size:11px;color:var(--text3)}
.empty-state{text-align:center;padding:32px 0;color:var(--text3);font-size:13px}
.empty-icon{font-size:28px;margin-bottom:8px}

/* ── FAB (floating add button) ── */
.fab{position:fixed;bottom:calc(var(--nav) + 14px);right:max(14px, calc((100vw - 480px)/2 + 14px));width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;font-size:26px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:99;box-shadow:0 4px 16px rgba(26,92,255,.35);font-family:var(--font);transition:transform .15s}
.fab:active{transform:scale(.92)}
.fab.hidden{display:none}

/* ── SHEET (bottom modal) ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:flex-end;justify-content:center}
.overlay.on{display:flex}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:0 16px 32px;max-height:90dvh;overflow-y:auto}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 14px}
.sheet-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:14px}

/* ── WHO ROW ── */
.who-row{display:flex;gap:7px;margin-bottom:12px}
.who-btn{flex:1;padding:9px 6px;border-radius:var(--r-sm);border:1px solid var(--border2);background:var(--surface2);font-size:13px;font-weight:650;cursor:pointer;font-family:var(--font);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;color:var(--text2)}
.who-btn.on{border-width:1.5px}
.who-av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}

/* ── QUICK EXPENSE SHEET ── */
.qe-amt-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.qe-sym{font-size:22px;font-weight:700;color:var(--text2)}
.qe-amt-in{flex:1;font-size:28px;font-weight:700;padding:8px 0;border:none;border-bottom:2px solid var(--border2);border-radius:0;background:transparent;color:var(--text);font-family:var(--font)}
.qe-amt-in:focus{outline:none;border-bottom-color:var(--accent)}
.qe-curr-toggle{font-size:12px;padding:6px 10px;border-radius:20px;border:.5px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;font-family:var(--font);font-weight:600;white-space:nowrap}
.qe-curr-toggle.jpy{background:var(--purple-bg);color:var(--purple);border-color:var(--purple)}
.qe-name-in{width:100%;font-size:15px;padding:10px 11px;border:.5px solid var(--border2);border-radius:var(--r-sm);font-family:var(--font);background:var(--bg);color:var(--text);margin-bottom:12px}
.qe-name-in:focus{outline:none;border-color:var(--accent)}
.cat-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.cat-chip{font-size:12px;padding:6px 11px;border-radius:20px;border:.5px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;font-family:var(--font);font-weight:600;transition:all .15s}
.cat-chip.on{border-width:1.5px}
.qe-extras{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.qe-save{width:100%;font-size:15px;padding:13px;border-radius:var(--r-sm);border:none;background:var(--accent);color:#fff;cursor:pointer;font-family:var(--font);font-weight:700}
.qe-save:active{opacity:.85}

/* ── SCAN SHEET ── */
.scan-area{border:1.5px dashed var(--border2);border-radius:var(--r);padding:26px 16px;text-align:center;cursor:pointer;margin-bottom:12px}
.scan-area:active{border-color:var(--accent)}
.scan-icon{font-size:30px;margin-bottom:7px}
.scan-hint{font-size:13px;color:var(--text2);margin-bottom:3px}
.scan-hint2{font-size:11px;color:var(--text3)}
.scan-preview{width:100%;border-radius:var(--r-sm);margin-bottom:12px;display:none}
.scan-result{background:var(--green-bg);border-radius:var(--r-sm);padding:11px 12px;margin-bottom:12px;display:none}
.sr-title{font-size:11px;color:var(--green);font-weight:700;margin-bottom:7px}
.sr-row{display:flex;justify-content:space-between;margin-bottom:4px}
.sr-l{font-size:12px;color:var(--text2)}
.sr-v{font-size:12px;font-weight:700;color:var(--text)}
.scan-loading{text-align:center;padding:16px;display:none;font-size:13px;color:var(--text2)}
.api-box{background:var(--amber-bg);border-radius:var(--r-sm);padding:10px 11px;margin-bottom:12px;display:none}
.api-box-label{font-size:11px;color:var(--amber);font-weight:600;margin-bottom:6px}
.api-row{display:flex;gap:7px}
.api-in{flex:1;font-size:12px;padding:7px 8px;border:.5px solid var(--amber);border-radius:var(--r-sm);font-family:var(--font);background:#fff;color:var(--text)}
.api-in:focus{outline:none}
.api-save-btn{font-size:12px;padding:7px 12px;border-radius:var(--r-sm);border:none;background:var(--amber);color:#fff;cursor:pointer;font-family:var(--font);font-weight:600}
</style>
</head>
<body>
<div class="app">

<!-- HERO -->
<div class="hero">
  <div class="hero-title">🇯🇵 大阪・神戶・名古屋</div>
  <div class="hero-meta">
    <span class="pill">11/4 — 11/8 · 2026</span>
    <span class="pill">花花 全程</span>
    <span class="pill">米 11/5起</span>
    <span class="pill hi">YOASOBI 11/7 🎵</span>
  </div>
</div>

<!-- STATS -->
<div class="stats">
  <div class="sc"><div class="sc-l">旅行天數</div><div class="sc-v">5</div><div class="sc-s">天</div></div>
  <div class="sc"><div class="sc-l">待辦未完</div><div class="sc-v" id="st-todo">—</div><div class="sc-s">項</div></div>
  <div class="sc"><div class="sc-l">累積花費</div><div class="sc-v" id="st-jpy">¥0</div><div class="sc-s" id="st-ntd">NT$0</div></div>
</div>

<!-- ITINERARY -->
<div id="sec-it" class="sec on"><div id="days-root"></div></div>

<!-- CHECKLIST -->
<div id="sec-ck" class="sec"><div id="checks-root"></div></div>

<!-- BUDGET -->
<div id="sec-bu" class="sec">
  <div class="bboard" id="bboard">
    <div class="bboard-label">旅費總覽</div>
    <div class="bboard-jpy" id="bj">¥0</div>
    <div class="bboard-ntd" id="bn">≈ NT$0</div>
    <div class="bboard-cats" id="bc"></div>
  </div>
  <div class="wallets" id="wallets-root"></div>
  <div class="exp-hd">
    <span class="exp-hd-title">支出明細</span>
    <button class="scan-btn" onclick="openScan()">📷 掃描收據</button>
  </div>
  <div id="exp-root"></div>
  <div id="total-bar" style="display:none" class="total-bar">
    <span class="total-l">總計</span>
    <div style="text-align:right"><div class="total-jpy" id="tj"></div><div class="total-ntd" id="tn"></div></div>
  </div>
</div>

</div>

<!-- FAB -->
<button class="fab" id="fab" onclick="openQE()">＋</button>

<!-- BOTTOM NAV -->
<nav class="bnav">
  <button class="bnav-item on" id="nav-it" onclick="sw('it',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>行程
  </button>
  <button class="bnav-item" id="nav-ck" onclick="sw('ck',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>待辦
  </button>
  <button class="bnav-item" id="nav-bu" onclick="sw('bu',this)">

    {t:'購買旅遊保險'},
  ]},
];

// ── NAV ──
function sw(name,btn){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.bnav-item').forEach(b=>b.classList.remove('on'));
  document.getElementById('sec-'+name).classList.add('on');
  btn.classList.add('on');
  document.getElementById('fab').className='fab'+(name==='bu'?'':' hidden');
  if(name==='bu'){renderBudget();}
}

// ── ITINERARY ──
function dot(ev){return ev.tbd?'tbd':(ev.type||'sight')}
function badge(ev){
  if(ev.tbd&&ev.type==='hotel')return['tbd','住宿待定'];
  if(ev.tbd)return['tbd','待定'];
  const m={flight:['flight','航班'],transport:['transport','交通'],hotel:['hotel','住宿'],food:['food','餐飲'],sight:['sight','景點'],event:['event','活動']};
  return m[ev.type]||['sight','景點'];
}
function hotelHTML(){
  const ch=hotelChoice;
  const sel=nagoyaHotels.find(h=>h.id===ch);
  return`<div class="hotel-pick"><div class="hotel-opts">${nagoyaHotels.map(h=>`
    <div class="hopt${ch===h.id?' on':''}" onclick="pickHotel('${h.id}')">
      <div class="hopt-name">${h.name}</div>
      <div class="hopt-sub">${h.sub}</div>
      ${h.map?`<a class="hopt-map" href="${h.map}" target="_blank" onclick="event.stopPropagation()">📍 地圖</a>`:''}
    </div>`).join('')}</div>
  <div class="hotel-status ${ch?'ok':'warn'}">${ch?'✓ 已選：'+sel.name:'⚠ 請點選其中一間'}</div></div>`;
}
function pickHotel(id){
  hotelChoice=id;localStorage.setItem('hchoice',id);
  renderItinerary();renderChecklist();
}
function renderItinerary(){
  const root=document.getElementById('days-root');
  root.innerHTML='';
  days.forEach((d,di)=>{
    const extra=addedItems[di]||[];
    const allItems=[...d.items,...extra];
    const itemsHTML=allItems.map((ev,ei)=>{
      const eid=`ev-${di}-${ei}`;
      const dc=dot(ev);
      const[bc,bl]=badge(ev);
      const isChoice=ev.hotelType==='choice';
      const nv=notes[eid]||'';
      return`<div class="ev">
        <div class="ev-dot ${dc}"></div>
        <div class="ev-card${ev.tbd?' tbd':''}" id="${eid}">
          <div class="ev-top" onclick="toggleEv('${eid}')">
            <span class="ev-time">${ev.time}</span>
            <span class="ev-name">${isChoice?'名古屋住宿・選定':ev.name}</span>
            <span class="ev-badge b-${bc}">${bl}</span>
            <span class="ev-arr">›</span>
          </div>
          <div class="ev-body">
            ${isChoice?hotelHTML():`<div class="ev-desc">${ev.desc}</div>`}
            ${!isChoice&&ev.map?`<a class="map-btn" href="${ev.map}" target="_blank">📍 在 Google Maps 開啟</a>`:''}
            <textarea class="note-field" rows="2" placeholder="筆記..." onchange="saveNote('${eid}',this.value)">${nv}</textarea>
          </div>
        </div>
      </div>`;
    }).join('');
    root.innerHTML+=`<div class="day">
      <div class="day-head">
        <span class="day-num">DAY ${d.day}</span>
        <div><div class="day-info-name">${d.label}</div><div class="day-info-date">${d.date}${d.trav?' · '+d.trav:''}</div></div>
      </div>
      <div class="tl">${itemsHTML}</div>
      ${(()=>{const dt=DAY_DATES[di];const dayExps=expenses.filter(e=>DAY_DATES[e.day-1]===dt||e.day===(di+1));const dayTot=dayExps.reduce((s,e)=>s+e.jpy,0);return dayTot>0?`<div style="display:flex;align-items:center;gap:6px;margin:6px 0 2px;padding:7px 10px;background:var(--surface);border:.5px solid var(--border);border-radius:var(--r-sm)"><span style="font-size:11px;color:var(--text3)">當日花費</span><span style="flex:1;height:.5px;background:var(--border)"></span><span style="font-size:12px;font-weight:700;color:var(--text)">¥${dayTot.toLocaleString()}</span><span style="font-size:11px;color:var(--text3)">NT$${Math.round(dayTot*R).toLocaleString()}</span></div>`:''})()}
      <div class="add-ev-row">
        <button class="add-ev-toggle" onclick="toggleAddEv(${di})">＋ 新增行程</button>
        <div class="add-ev-form" id="aef-${di}">
          <div class="fg">
            <input class="fi" id="at-${di}" placeholder="時間（如 14:00）"/>
            <select class="fs" id="ay-${di}"><option value="sight">景點</option><option value="food">餐飲</option><option value="transport">交通</option><option value="hotel">住宿</option><option value="event">活動</option><option value="flight">航班</option></select>
            <input class="fi fg-full" id="an-${di}" placeholder="名稱（必填）"/>
            <input class="fi fg-full" id="ad-${di}" placeholder="備註說明"/>
            <input class="fi fg-full" id="am-${di}" placeholder="Google Maps 連結（選填）"/>
          </div>
          <div class="fa"><button class="btn btn-p" onclick="doAddEv(${di})">新增</button><button class="btn" onclick="toggleAddEv(${di})">取消</button></div>
        </div>
      </div>
    </div>`;
  });
  updateStats();
}
function toggleEv(id){document.getElementById(id).classList.toggle('open');}
function saveNote(id,v){notes[id]=v;localStorage.setItem('notes',JSON.stringify(notes));}
function toggleAddEv(di){document.getElementById('aef-'+di).classList.toggle('on');}
function doAddEv(di){
  const n=document.getElementById('an-'+di).value.trim();
  if(!n)return;
  const item={time:document.getElementById('at-'+di).value||'—',name:n,type:document.getElementById('ay-'+di).value,desc:document.getElementById('ad-'+di).value,map:document.getElementById('am-'+di).value};
  if(!addedItems[di])addedItems[di]=[];
  addedItems[di].push(item);
  localStorage.setItem('addevs',JSON.stringify(addedItems));
  document.getElementById('at-'+di).value='';
  document.getElementById('an-'+di).value='';
  document.getElementById('ad-'+di).value='';
  document.getElementById('am-'+di).value='';
  renderItinerary();
}

// ── CHECKLIST ──
function renderChecklist(){
  const root=document.getElementById('checks-root');
  root.innerHTML='';
  cgData.forEach(g=>{
    const extra=JSON.parse(localStorage.getItem('ckadd-'+g.id)||'[]');
    const allItems=[...g.items,...extra.map(t=>({t}))];
    const total=allItems.length;
    const done=allItems.filter((_,i)=>checkState[g.id+'-'+i]).length;
    const itemsHTML=allItems.map((item,i)=>{
      const k=g.id+'-'+i;
      const d=!!checkState[k];
      return`<div class="ci">
        <input type="checkbox" class="ci-cb" ${d?'checked':''} onchange="toggleCK('${k}',this.checked)"/>
        <div class="ci-text">
          <div class="ci-label${d?' done':''}" id="cl-${k}">${item.t}</div>
          ${item.s?`<div class="ci-sub">${item.s}</div>`:''}
        </div>
      </div>`;
    }).join('');
    root.innerHTML+=`<div class="cg">
      <div class="cg-head"><span class="cg-title">${g.title}</span><span class="cg-prog">${done}/${total}</span></div>
      ${itemsHTML}
      <div class="ci-add">
        <input class="ci-add-in" id="ci-${g.id}" placeholder="新增待辦..."/>
        <button class="btn btn-p" onclick="addCK('${g.id}')" style="font-size:12px;padding:7px 12px">新增</button>
      </div>
    </div>`;
  });
  updateStats();
}
function toggleCK(k,v){
  checkState[k]=v;localStorage.setItem('cks',JSON.stringify(checkState));
  const el=document.getElementById('cl-'+k);if(el)el.classList.toggle('done',v);
  updateStats();
}
function addCK(gid){
  const inp=document.getElementById('ci-'+gid);
  if(!inp.value.trim())return;
  const arr=JSON.parse(localStorage.getItem('ckadd-'+gid)||'[]');
  arr.push(inp.value.trim());
  localStorage.setItem('ckadd-'+gid,JSON.stringify(arr));
  inp.value='';renderChecklist();
}

// ── BUDGET ──
function renderBudget(){renderWallets();renderExpList();renderDash();}
function renderDash(){
  const tot=expenses.reduce((s,e)=>s+e.jpy,0);
  document.getElementById('bj').textContent='¥'+tot.toLocaleString();
  document.getElementById('bn').textContent='≈ NT$'+Math.round(tot*R).toLocaleString();
  const cats={};expenses.forEach(e=>{cats[e.cat]=(cats[e.cat]||0)+e.jpy;});
  document.getElementById('bc').innerHTML=Object.entries(cats).sort((a,b)=>b[1]-a[1])
    .map(([c,a])=>`<div class="bboard-cat">${c} <em>¥${a.toLocaleString()}</em></div>`).join('');
}
function renderWallets(){
  document.getElementById('wallets-root').innerHTML=
    [{id:'日幣現金',label:'日幣現金',unit:'¥',jpy:true},{id:'信用卡A',label:'信用卡 A',unit:'NT$',jpy:false},
     {id:'信用卡B',label:'信用卡 B',unit:'NT$',jpy:false},{id:'Suica',label:'Suica',unit:'¥',jpy:true}]
    .map(w=>{
      const b=parseFloat(walletBals[w.id]||0);
      const b2=w.jpy?`≈ NT$${Math.round(b*R).toLocaleString()}`:`≈ ¥${Math.round(b*NJ).toLocaleString()}`;
      return`<div class="wcard">
        <div class="wcard-name">${w.label}</div>
        <div class="wcard-bal">${w.unit}${b.toLocaleString()}</div>
        <div class="wcard-bal2">${b2}</div>
        <div class="wcard-in-row">
          <input class="wcard-in" type="number" placeholder="設定餘額" value="${b||''}" onchange="setWal('${w.id}',this.value)"/>
          <span class="wcard-unit">${w.unit}</span>
        </div>
      </div>`;
    }).join('');
}
function setWal(id,v){walletBals[id]=parseFloat(v)||0;localStorage.setItem('wbals',JSON.stringify(walletBals));renderWallets();}
function renderExpList(){
  const root=document.getElementById('exp-root');
  if(!expenses.length){root.innerHTML='<div class="empty-state"><div class="empty-icon">💴</div>還沒有費用記錄<br>點右下角 ＋ 快速新增</div>';document.getElementById('total-bar').style.display='none';return;}
  root.innerHTML=expenses.map((e,i)=>{
    const t=travelers.find(x=>x.id===e.who)||travelers[0];
    return`<div class="ecard"><div class="erow">
      <div class="eavatar" style="background:${t.bg};color:${t.color}">${t.name[0]}</div>
      <div class="emid">
        <div class="ename">${e.name}</div>
        <div class="emeta"><span class="ctag ct-${e.cat}">${e.cat}</span>${DAY_DATES[e.day-1]||('第'+e.day+'天')} · ${e.wallet} · ${t.name}</div>
      </div>
      <div class="eamts"><div class="ejpy">¥${e.jpy.toLocaleString()}</div><div class="entd">NT$${e.ntd.toLocaleString()}</div></div>
      <button class="edel" onclick="delExp(${i})">×</button>
    </div></div>`;
  }).join('');
  const tj=expenses.reduce((s,e)=>s+e.jpy,0),tn=expenses.reduce((s,e)=>s+e.ntd,0);
  document.getElementById('tj').textContent='¥'+tj.toLocaleString();
  document.getElementById('tn').textContent='≈ NT$'+tn.toLocaleString();
  document.getElementById('total-bar').style.display='flex';
}
function delExp(i){expenses.splice(i,1);localStorage.setItem('exps',JSON.stringify(expenses));renderExpList();renderDash();updateStats();}

// ── QUICK EXPENSE ──
function buildWhoRow(rowId,stateKey){
  document.getElementById(rowId).innerHTML=travelers.map(t=>`
    <button class="who-btn${window[stateKey]===t.id?' on':''}"
      style="${window[stateKey]===t.id?`border-color:${t.color};background:${t.bg};color:${t.color}`:''}"
      onclick="pickWho('${t.id}','${stateKey}','${rowId}')">
      <span class="who-av" style="background:${t.bg};color:${t.color}">${t.name[0]}</span>${t.name}
    </button>`).join('');
}
function pickWho(id,sk,rowId){window[sk]=id;buildWhoRow(rowId,sk);}
function buildCatRow(rowId,stateKey){
  document.getElementById(rowId).innerHTML=CATS.map(c=>`
    <button class="cat-chip ct-${c}${window[stateKey]===c?' on':''}"
      style="${window[stateKey]===c?'border-color:currentColor;opacity:1':'opacity:.7'}"
      onclick="pickCat('${c}','${stateKey}','${rowId}')">${c}</button>`).join('');
}
function pickCat(c,sk,rowId){window[sk]=c;buildCatRow(rowId,sk);}

let currIsJpy=true;
function toggleCurr(){
  currIsJpy=!currIsJpy;qeCurr=currIsJpy?'JPY':'NTD';
  const btn=document.getElementById('qe-curr-btn');
  btn.textContent=currIsJpy?'¥ 日幣':'NT$ 台幣';
  btn.className='qe-curr-toggle'+(currIsJpy?' jpy':'');
  document.getElementById('qe-sym').textContent=currIsJpy?'¥':'NT$';
}
function openQE(){
  buildWhoRow('qe-who','qeWho');buildCatRow('qe-cats','qeCat');
  document.getElementById('qe-amt').value='';document.getElementById('qe-name').value='';
  document.getElementById('qe-overlay').classList.add('on');
  setTimeout(()=>document.getElementById('qe-amt').focus(),100);
}
function closeQE(){document.getElementById('qe-overlay').classList.remove('on');}
function saveQE(){
  const name=document.getElementById('qe-name').value.trim();
  const amt=parseFloat(document.getElementById('qe-amt').value)||0;
  const wallet=document.getElementById('qe-wallet').value;
  const day=parseInt(document.getElementById('qe-day').value)||1;
  if(!name||!amt)return;
  const jpy=currIsJpy?amt:Math.round(amt*NJ);
  const ntd=currIsJpy?Math.round(amt*R):amt;
  expenses.push({name,jpy,ntd,cat:qeCat,wallet,day,who:qeWho});
  localStorage.setItem('exps',JSON.stringify(expenses));
  closeQE();renderExpList();renderDash();updateStats();
}
function outsideClose(e,id){if(e.target.id===id)document.getElementById(id).classList.remove('on');}

// ── SCAN ──
function openScan(){
  document.getElementById('api-box').style.display=apiKey?'none':'block';
  document.getElementById('api-in').value=apiKey;
  document.getElementById('scan-prev').style.display='none';
  document.getElementById('scan-result').style.display='none';
  document.getElementById('scan-form-wrap').style.display='none';
  document.getElementById('scan-loading').style.display='none';
  buildWhoRow('scan-who','scanWho');buildCatRow('sf-cats','sfCat');
  document.getElementById('scan-overlay').classList.add('on');
}
function closeScan(){document.getElementById('scan-overlay').classList.remove('on');}
function saveKey(){
  apiKey=document.getElementById('api-in').value.trim();
  localStorage.setItem('ak',apiKey);
  document.getElementById('api-box').style.display=apiKey?'none':'block';
}
async function handleScan(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async e=>{
    const prev=document.getElementById('scan-prev');prev.src=e.target.result;prev.style.display='block';
    document.getElementById('scan-form-wrap').style.display='none';
    document.getElementById('scan-result').style.display='none';
    if(apiKey){
      document.getElementById('scan-loading').style.display='block';
      try{
        const b64=e.target.result.split(',')[1];
        const res=await fetch('https://api.anthropic.com/v1/messages',{
          method:'POST',
          headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01'},
          body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,
            messages:[{role:'user',content:[
              {type:'image',source:{type:'base64',media_type:file.type||'image/jpeg',data:b64}},
              {type:'text',text:'這是日本收據。只回JSON不要其他文字：{"shop":"店名翻譯成繁體中文","amount":金額數字,"category":"食或樂或住或行或用品或禮"}'}
            ]}]})
        });
        const data=await res.json();
        const txt=data.content?.[0]?.text||'{}';
        const p=JSON.parse(txt.replace(/```json|```/g,'').trim());
        document.getElementById('sr-shop').textContent=p.shop||'—';
        document.getElementById('sr-amt').textContent=p.amount?'¥'+p.amount:'—';
        document.getElementById('sr-cat').textContent=p.category||'食';
        document.getElementById('scan-result').style.display='block';
        document.getElementById('sf-amt').value=p.amount||'';
        document.getElementById('sf-name').value=p.shop||'';
        sfCat=p.category||'食';buildCatRow('sf-cats','sfCat');
      }catch(err){}
      document.getElementById('scan-loading').style.display='none';
    }
    document.getElementById('scan-form-wrap').style.display='block';
  };reader.readAsDataURL(file);
}
function saveScan(){
  const name=document.getElementById('sf-name').value.trim();
  const amt=parseFloat(document.getElementById('sf-amt').value)||0;
  const wallet=document.getElementById('sf-wallet').value;
  const day=parseInt(document.getElementById('sf-day').value)||1;
  if(!name||!amt)return;
  expenses.push({name,jpy:amt,ntd:Math.round(amt*R),cat:sfCat,wallet,day,who:scanWho});
  localStorage.setItem('exps',JSON.stringify(expenses));
  closeScan();renderExpList();renderDash();updateStats();
}

// ── STATS ──
function updateStats(){
  const todo=cgData.reduce((s,g)=>{
    const extra=JSON.parse(localStorage.getItem('ckadd-'+g.id)||'[]');
    const n=g.items.length+extra.length;
    const d=Array.from({length:n},(_,i)=>checkState[g.id+'-'+i]).filter(Boolean).length;
    return s+(n-d);
  },0);
  document.getElementById('st-todo').textContent=todo;
  const tj=expenses.reduce((s,e)=>s+e.jpy,0);
  document.getElementById('st-jpy').textContent='¥'+tj.toLocaleString();
  document.getElementById('st-ntd').textContent='NT$'+Math.round(tj*R).toLocaleString();
}

// ── INIT ──
document.getElementById('fab').className='fab hidden';
renderItinerary();renderChecklist();
</script>
