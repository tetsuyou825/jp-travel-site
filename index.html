<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🇯🇵 大阪・神戶・名古屋 2026</title>
<style>
:root {
  --bg: #f7f6f3;
  --surface: #ffffff;
  --surface2: #f0ede8;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #1a1a1a;
  --text2: #6b6560;
  --text3: #a09b96;
  --accent: #2b5ce6;
  --accent-bg: #eef1fd;
  --tbd: #c9b99a;
  --tbd-bg: #faf7f2;
  --green: #1a7a4a;
  --green-bg: #e8f5ee;
  --red: #c0392b;
  --red-bg: #fdf0ef;
  --amber: #9a6200;
  --amber-bg: #fef7e6;
  --purple: #6b3fa0;
  --purple-bg: #f3eefb;
  --pink: #b03060;
  --pink-bg: #fdf0f5;
  --radius: 12px;
  --radius-sm: 8px;
  --nav-h: 60px;
  --font: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100dvh; }
.app { max-width: 480px; margin: 0 auto; padding-bottom: calc(var(--nav-h) + 16px); }

/* NAV */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); border-top: .5px solid var(--border); height: var(--nav-h); display: flex; z-index: 100; max-width: 480px; margin: 0 auto; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; border: none; background: none; color: var(--text3); font-size: 10px; font-family: var(--font); transition: color .15s; padding: 0; }
.nav-item.active { color: var(--accent); }
.nav-item svg { width: 22px; height: 22px; }

/* SECTIONS */
.section { display: none; padding: 0 16px; }
.section.active { display: block; }

/* HEADER */
.page-header { padding: 20px 16px 12px; }
.trip-title { font-size: 22px; font-weight: 700; letter-spacing: -.5px; color: var(--text); }
.trip-subtitle { font-size: 13px; color: var(--text2); margin-top: 4px; display: flex; gap: 8px; flex-wrap: wrap; }
.pill { background: var(--surface2); border-radius: 20px; padding: 2px 9px; font-size: 12px; color: var(--text2); }
.pill.accent { background: var(--accent-bg); color: var(--accent); }

/* STAT CARDS */
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 0 16px 16px; }
.stat-card { background: var(--surface); border-radius: var(--radius-sm); padding: 12px; border: .5px solid var(--border); }
.stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px; }
.stat-value { font-size: 18px; font-weight: 700; color: var(--text); }
.stat-sub { font-size: 10px; color: var(--text3); margin-top: 1px; }

/* DAY BLOCKS */
.day-block { margin-bottom: 20px; }
.day-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.day-num { background: var(--text); color: white; font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; letter-spacing: .3px; }
.day-info { flex: 1; }
.day-name { font-size: 14px; font-weight: 600; color: var(--text); }
.day-date { font-size: 11px; color: var(--text3); margin-top: 1px; }

/* TIMELINE */
.timeline { position: relative; padding-left: 20px; }
.timeline::before { content: ''; position: absolute; left: 5px; top: 10px; bottom: 10px; width: 1px; background: var(--border2); }
.ev-wrap { position: relative; margin-bottom: 7px; }
.ev-dot { position: absolute; left: -16px; top: 13px; width: 8px; height: 8px; border-radius: 50%; background: var(--border2); border: 2px solid var(--bg); transition: background .2s; }
.ev-dot.flight, .ev-dot.transport { background: var(--purple); }
.ev-dot.hotel { background: var(--accent); }
.ev-dot.food { background: var(--amber); }
.ev-dot.sight { background: var(--green); }
.ev-dot.event { background: var(--pink); }
.ev-dot.tbd { background: var(--tbd); border-style: dashed; }
.ev-card { background: var(--surface); border: .5px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; cursor: pointer; transition: border-color .15s; }
.ev-card:active { opacity: .85; }
.ev-card.tbd-card { background: var(--tbd-bg); border-color: var(--tbd); border-style: dashed; }
.ev-card.open { border-color: var(--border2); }
.ev-main { display: flex; align-items: center; gap: 8px; padding: 9px 11px; }
.ev-time { font-size: 11px; color: var(--text3); min-width: 38px; flex-shrink: 0; }
.ev-name { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; line-height: 1.3; }
.ev-card.tbd-card .ev-name { color: var(--text2); }
.ev-badge { font-size: 10px; padding: 2px 6px; border-radius: 20px; flex-shrink: 0; font-weight: 500; }
.badge-flight, .badge-transport { background: var(--purple-bg); color: var(--purple); }
.badge-hotel { background: var(--accent-bg); color: var(--accent); }
.badge-food { background: var(--amber-bg); color: var(--amber); }
.badge-sight { background: var(--green-bg); color: var(--green); }
.badge-event { background: var(--pink-bg); color: var(--pink); }
.badge-tbd { background: var(--surface2); color: var(--text3); border: .5px dashed var(--border2); }
.ev-chevron { color: var(--text3); font-size: 14px; flex-shrink: 0; transition: transform .2s; }
.ev-card.open .ev-chevron { transform: rotate(90deg); }
.ev-body { display: none; padding: 0 11px 10px; border-top: .5px solid var(--border); margin-top: 0; }
.ev-card.open .ev-body { display: block; }
.ev-desc { font-size: 12px; color: var(--text2); line-height: 1.6; padding-top: 9px; }
.map-btn { display: inline-flex; align-items: center; gap: 5px; margin-top: 8px; font-size: 12px; background: var(--green-bg); color: var(--green); padding: 5px 10px; border-radius: 20px; text-decoration: none; font-weight: 500; }
.note-area { width: 100%; margin-top: 9px; font-size: 12px; padding: 7px 9px; border: .5px solid var(--border2); border-radius: var(--radius-sm); resize: none; font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.5; }
.note-area:focus { outline: none; border-color: var(--accent); }

/* HOTEL PICKER */
.hotel-picker { padding-top: 9px; }
.hotel-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 7px; }
.hotel-opt { border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 8px 9px; cursor: pointer; transition: all .15s; background: var(--surface); }
.hotel-opt.chosen { border-color: var(--accent); border-width: 1.5px; background: var(--accent-bg); }
.hotel-opt-name { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 2px; line-height: 1.3; }
.hotel-opt.chosen .hotel-opt-name { color: var(--accent); }
.hotel-opt-sub { font-size: 10px; color: var(--text3); }
.hotel-map { display: block; font-size: 11px; color: var(--accent); margin-top: 4px; text-decoration: none; }
.hotel-status { font-size: 12px; font-weight: 500; }
.hotel-status.ok { color: var(--green); }
.hotel-status.warn { color: var(--red); }

/* ADD EVENT */
.add-ev-btn { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text3); padding: 6px 2px; background: none; border: none; cursor: pointer; font-family: var(--font); margin-top: 2px; }
.add-ev-btn:active { color: var(--text); }
.add-form { background: var(--surface2); border-radius: var(--radius-sm); padding: 11px; margin-top: 6px; display: none; }
.add-form.show { display: block; }
.f-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 7px; }
.f-full { grid-column: span 2; }
.f-in, .f-sel { width: 100%; font-size: 13px; padding: 7px 9px; border: .5px solid var(--border2); border-radius: var(--radius-sm); font-family: var(--font); background: var(--surface); color: var(--text); }
.f-in:focus, .f-sel:focus { outline: none; border-color: var(--accent); }
.f-actions { display: flex; gap: 7px; }
.btn { font-size: 13px; padding: 7px 16px; border-radius: var(--radius-sm); border: .5px solid var(--border2); background: var(--surface); color: var(--text); cursor: pointer; font-family: var(--font); font-weight: 500; }
.btn:active { opacity: .8; }
.btn-primary { background: var(--text); color: white; border-color: transparent; }

/* CHECKLIST */
.check-group { background: var(--surface); border-radius: var(--radius); border: .5px solid var(--border); overflow: hidden; margin-bottom: 12px; }
.check-group-head { display: flex; align-items: center; justify-content: space-between; padding: 13px 14px 10px; border-bottom: .5px solid var(--border); }
.check-group-title { font-size: 14px; font-weight: 600; color: var(--text); }
.check-progress { font-size: 12px; color: var(--text3); font-weight: 500; }
.check-item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 14px; border-bottom: .5px solid var(--border); }
.check-item:last-child { border-bottom: none; }
.check-cb { width: 17px; height: 17px; flex-shrink: 0; margin-top: 1px; cursor: pointer; accent-color: var(--accent); }
.check-text { flex: 1; }
.check-label { font-size: 13px; color: var(--text); line-height: 1.4; }
.check-label.done { text-decoration: line-through; color: var(--text3); }
.check-sub-text { font-size: 11px; color: var(--text3); margin-top: 2px; }
.check-add-row { display: flex; gap: 7px; padding: 9px 14px; }
.check-add-in { flex: 1; font-size: 13px; padding: 6px 9px; border: .5px solid var(--border2); border-radius: var(--radius-sm); font-family: var(--font); background: var(--bg); color: var(--text); }
.check-add-in:focus { outline: none; }

/* BUDGET */
.dashboard { background: var(--text); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; color: white; }
.dash-title { font-size: 11px; opacity: .6; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }
.dash-total { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 2px; }
.dash-total-ntd { font-size: 13px; opacity: .6; margin-bottom: 14px; }
.dash-cats { display: flex; gap: 6px; flex-wrap: wrap; }
.dash-cat { background: rgba(255,255,255,.12); border-radius: 20px; padding: 3px 9px; font-size: 11px; }
.dash-cat span { opacity: .7; font-size: 10px; }

.wallet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.wallet-card { background: var(--surface); border: .5px solid var(--border); border-radius: var(--radius-sm); padding: 11px 12px; }
.wallet-name { font-size: 10px; color: var(--text3); margin-bottom: 4px; }
.wallet-bal { font-size: 17px; font-weight: 700; color: var(--text); }
.wallet-bal2 { font-size: 11px; color: var(--text3); margin-top: 2px; }
.wallet-in-row { display: flex; align-items: center; gap: 5px; margin-top: 7px; }
.wallet-in { flex: 1; font-size: 12px; padding: 4px 7px; border: .5px solid var(--border2); border-radius: 6px; font-family: var(--font); background: var(--bg); color: var(--text); }
.wallet-in:focus { outline: none; }
.wallet-unit { font-size: 11px; color: var(--text3); }

.budget-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.budget-hd-title { font-size: 14px; font-weight: 600; color: var(--text); }
.budget-actions { display: flex; gap: 7px; }
.scan-btn { display: flex; align-items: center; gap: 5px; font-size: 12px; background: var(--amber-bg); color: var(--amber); padding: 6px 12px; border-radius: 20px; border: .5px solid var(--amber); cursor: pointer; font-family: var(--font); font-weight: 600; }

.exp-card { background: var(--surface); border: .5px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 7px; }
.exp-row { display: flex; align-items: center; gap: 9px; padding: 10px 12px; }
.exp-avatar { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.exp-mid { flex: 1; min-width: 0; }
.exp-name-row { display: flex; align-items: center; gap: 6px; }
.exp-name { font-size: 13px; font-weight: 500; color: var(--text); }
.cat-tag { font-size: 10px; padding: 1px 6px; border-radius: 20px; font-weight: 500; }
.ct-食 { background: var(--amber-bg); color: var(--amber); }
.ct-樂 { background: var(--pink-bg); color: var(--pink); }
.ct-住 { background: var(--accent-bg); color: var(--accent); }
.ct-行 { background: var(--purple-bg); color: var(--purple); }
.ct-必須 { background: var(--red-bg); color: var(--red); }
.ct-用品 { background: var(--green-bg); color: var(--green); }
.ct-禮 { background: var(--surface2); color: var(--text2); }
.exp-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
.exp-amts { text-align: right; flex-shrink: 0; }
.exp-jpy { font-size: 13px; font-weight: 700; color: var(--text); }
.exp-ntd { font-size: 10px; color: var(--text3); }
.exp-del { background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; padding: 0 0 0 4px; flex-shrink: 0; line-height: 1; }

.total-row { display: flex; justify-content: space-between; align-items: flex-end; padding: 12px 14px; background: var(--surface); border-radius: var(--radius-sm); border: .5px solid var(--border); margin-top: 4px; }
.total-label { font-size: 13px; color: var(--text2); font-weight: 500; }
.total-amts { text-align: right; }
.total-jpy { font-size: 16px; font-weight: 800; color: var(--text); }
.total-ntd { font-size: 11px; color: var(--text3); }

/* ADD EXP FORM */
.add-exp-form { background: var(--surface); border: .5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; display: none; }
.add-exp-form.show { display: block; }
.form-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 11px; }
.who-row { display: flex; gap: 7px; margin-bottom: 10px; }
.who-btn { flex: 1; padding: 7px; border-radius: var(--radius-sm); border: .5px solid var(--border2); background: var(--surface2); font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 5px; }
.who-btn.selected { border-width: 1.5px; }

/* SCAN MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal-sheet { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; padding: 20px 16px 32px; max-height: 85dvh; overflow-y: auto; }
.modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 16px; }
.modal-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 14px; }
.scan-area { border: 1.5px dashed var(--border2); border-radius: var(--radius); padding: 28px 16px; text-align: center; cursor: pointer; transition: border-color .15s; margin-bottom: 12px; }
.scan-area:hover { border-color: var(--accent); }
.scan-area-icon { font-size: 32px; margin-bottom: 8px; }
.scan-area-text { font-size: 13px; color: var(--text2); }
.scan-area-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
.scan-preview { width: 100%; border-radius: var(--radius-sm); margin-bottom: 12px; display: none; }
.scan-result { background: var(--green-bg); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 12px; display: none; }
.scan-result-title { font-size: 11px; color: var(--green); font-weight: 600; margin-bottom: 8px; }
.scan-field { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.scan-field-label { font-size: 12px; color: var(--text2); }
.scan-field-val { font-size: 12px; font-weight: 600; color: var(--text); }
.api-key-notice { background: var(--amber-bg); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 12px; color: var(--amber); margin-bottom: 10px; display: none; }
#scan-file-input { display: none; }

/* EMPTY STATE */
.empty { text-align: center; padding: 36px 16px; color: var(--text3); font-size: 13px; }
.empty-icon { font-size: 32px; margin-bottom: 8px; }

/* DIVIDER */
.section-divider { height: .5px; background: var(--border); margin: 4px 0 14px; }
</style>
</head>
<body>
<div class="app">

<!-- HEADER -->
<div class="page-header">
  <div class="trip-title">🇯🇵 大阪・神戶・名古屋</div>
  <div class="trip-subtitle">
    <span>11月4日 — 8日 · 2026</span>
    <span class="pill">花花 全程</span>
    <span class="pill">米 11/5起</span>
    <span class="pill accent">YOASOBI 11/7 🎵</span>
  </div>
</div>

<!-- STATS -->
<div class="stats-row">
  <div class="stat-card">
    <div class="stat-label">旅行天數</div>
    <div class="stat-value">5</div>
    <div class="stat-sub">天</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">待辦未完</div>
    <div class="stat-value" id="st-todo">—</div>
    <div class="stat-sub">項</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">已記費用</div>
    <div class="stat-value" id="st-paid">¥0</div>
    <div class="stat-sub" id="st-paid-ntd">NT$0</div>
  </div>
</div>

<!-- ITINERARY SECTION -->
<div id="sec-itinerary" class="section active">
  <div id="days-root"></div>
</div>

<!-- CHECKLIST SECTION -->
<div id="sec-checklist" class="section">
  <div id="checks-root"></div>
</div>

<!-- BUDGET SECTION -->
<div id="sec-budget" class="section">
  <!-- Dashboard -->
  <div class="dashboard" id="dashboard">
    <div class="dash-title">旅費總覽</div>
    <div class="dash-total" id="dash-jpy">¥0</div>
    <div class="dash-total-ntd" id="dash-ntd">≈ NT$0</div>
    <div class="dash-cats" id="dash-cats"></div>
  </div>
  <!-- Wallets -->
  <div class="wallet-grid" id="wallets-root"></div>
  <!-- Expense list -->
  <div class="budget-hd">
    <div class="budget-hd-title">支出明細</div>
    <div class="budget-actions">
      <button class="scan-btn" onclick="openScan()">📷 掃描收據</button>
      <button class="btn btn-primary" onclick="toggleExpForm()">+ 手動</button>
    </div>
  </div>
  <!-- Add expense form -->
  <div class="add-exp-form" id="exp-form">
    <div class="form-title">新增費用</div>
    <div class="who-row" id="who-row"></div>
    <div class="f-grid">
      <input class="f-in f-full" id="ef-name" placeholder="費用名稱（如：一蘭拉麵）"/>
      <input class="f-in" id="ef-amt" placeholder="金額" type="number"/>
      <select class="f-sel" id="ef-curr">
        <option value="JPY">¥ 日幣</option>
        <option value="NTD">NT$ 台幣</option>
      </select>
      <select class="f-sel" id="ef-cat">
        <option>食</option><option>樂</option><option>住</option>
        <option>行</option><option>必須</option><option>用品</option><option>禮</option>
      </select>
      <select class="f-sel" id="ef-wallet">
        <option>日幣現金</option><option>信用卡A</option><option>信用卡B</option><option>Suica</option>
      </select>
      <input class="f-in" id="ef-day" placeholder="第幾天" type="number" min="1" max="5"/>
    </div>
    <div class="f-actions">
      <button class="btn btn-primary" onclick="addExp()">儲存</button>
      <button class="btn" onclick="toggleExpForm()">取消</button>
    </div>
  </div>
  <div id="exp-root"></div>
  <div class="total-row" id="total-row" style="display:none">
    <span class="total-label">總計</span>
    <div class="total-amts">
      <div class="total-jpy" id="total-jpy"></div>
      <div class="total-ntd" id="total-ntd"></div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-item active" onclick="sw('itinerary',this)" id="nav-itinerary">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    行程
  </button>
  <button class="nav-item" onclick="sw('checklist',this)" id="nav-checklist">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    待辦
  </button>
  <button class="nav-item" onclick="sw('budget',this)" id="nav-budget">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
    費用
  </button>
</nav>

<!-- SCAN MODAL -->
<div class="modal-overlay" id="scan-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">📷 掃描日文收據</div>
    <div class="api-key-notice" id="api-notice">請在設定中輸入 Anthropic API Key 以使用 AI 辨識功能</div>

</div>

  { id:'prep', title:'💴 出發前準備', items:[

    { text:'購買旅遊保險' },
  ]},
];

// initialise checks
let checkState;
if (checks) {
  checkState = checks;
} else {
  checkState = {};
  checkGroupsData.forEach(g => { g.items.forEach((item, i) => { checkState[g.id+'-'+i] = false; }); });
}

const wallets = [
  { id:'日幣現金', label:'日幣現金', unit:'¥', isJpy:true },
  { id:'信用卡A', label:'信用卡 A', unit:'NT$', isJpy:false },
  { id:'信用卡B', label:'信用卡 B', unit:'NT$', isJpy:false },
  { id:'Suica', label:'Suica', unit:'¥', isJpy:true },
];

// ---- NAVIGATION ----
function sw(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'budget') renderBudget();
}

// ---- ITINERARY ----
function typeClass(ev) {
  if (ev.tbd) return 'tbd';
  return ev.type || 'sight';
}
function typeBadge(ev) {
  if (ev.tbd && ev.type === 'hotel') return ['tbd', '住宿待定'];
  if (ev.tbd) return ['tbd', '待定'];
  const m = { flight:['flight','航班'], transport:['transport','交通'], hotel:['hotel','住宿'], food:['food','餐飲'], sight:['sight','景點'], event:['event','活動'] };
  return m[ev.type] || ['sight','景點'];
}

function hotelChoiceHTML() {
  const chosen = hotelChoice;
  const chosenHotel = nagoyaHotels.find(h => h.id === chosen);
  return `<div class="hotel-picker">
    <div class="hotel-opts">
      ${nagoyaHotels.map(h => `
        <div class="hotel-opt${chosen===h.id?' chosen':''}" onclick="selectHotel('${h.id}')">
          <div class="hotel-opt-name">${h.name}</div>
          <div class="hotel-opt-sub">${h.sub}</div>
          ${h.map ? `<a class="hotel-map" href="${h.map}" target="_blank" onclick="event.stopPropagation()">📍 地圖</a>` : ''}
        </div>`).join('')}
    </div>
    <div class="hotel-status ${chosen?'ok':'warn'}">${chosen ? '✓ 已選：'+chosenHotel.name : '⚠ 尚未選定，請點選'}</div>
  </div>`;
}

function selectHotel(id) {
  hotelChoice = id;
  localStorage.setItem('hotel_choice', id);
  renderItinerary();
  renderChecklist();
}

function renderItinerary() {
  const root = document.getElementById('days-root');
  root.innerHTML = '';
  const addedItems = JSON.parse(localStorage.getItem('added_items') || '{}');
  days.forEach((d, di) => {
    const allItems = [...d.items, ...(addedItems[di] || [])];
    let itemsHTML = allItems.map((ev, ei) => {
      const id = `ev-${di}-${ei}`;
      const tc = typeClass(ev);
      const [bc, bl] = typeBadge(ev);
      const isHotelChoice = ev.hotelType === 'choice';
      const isOpen = false;
      const noteVal = notes[id] || '';
      return `<div class="ev-wrap">
        <div class="ev-dot ${tc}"></div>
        <div class="ev-card${ev.tbd?' tbd-card':''}" id="${id}" onclick="toggleEv('${id}')">
          <div class="ev-main">
            <span class="ev-time">${ev.time}</span>
            <span class="ev-name">${isHotelChoice ? '名古屋住宿・選定' : ev.name}</span>
            <span class="ev-badge badge-${bc}">${bl}</span>
            <span class="ev-chevron">›</span>
          </div>
          <div class="ev-body">
            ${isHotelChoice ? hotelChoiceHTML() : `<div class="ev-desc">${ev.desc}</div>`}
            ${(!isHotelChoice && ev.map) ? `<a class="map-btn" href="${ev.map}" target="_blank">📍 在 Google Maps 開啟</a>` : ''}
            <textarea class="note-area" rows="2" placeholder="筆記..." onchange="saveNote('${id}',this.value)">${noteVal}</textarea>
          </div>
        </div>
      </div>`;
    }).join('');
    root.innerHTML += `<div class="day-block">
      <div class="day-head">
        <span class="day-num">DAY ${d.day}</span>
        <div class="day-info">
          <div class="day-name">${d.label}</div>
          <div class="day-date">${d.date}${d.travelers ? ' · ' + d.travelers : ''}</div>
        </div>
      </div>
      <div class="timeline">${itemsHTML}</div>
      <button class="add-ev-btn" onclick="showAddEv(${di})">＋ 新增行程</button>
      <div class="add-form" id="af-${di}">
        <div class="f-grid">
          <input class="f-in" id="at-${di}" placeholder="時間" />
          <select class="f-sel" id="ay-${di}">
            <option value="sight">景點</option><option value="food">餐飲</option>
            <option value="transport">交通</option><option value="hotel">住宿</option>
            <option value="event">活動</option><option value="flight">航班</option>
          </select>
          <input class="f-in f-full" id="an-${di}" placeholder="名稱"/>
          <input class="f-in f-full" id="ad-${di}" placeholder="備註說明"/>
          <input class="f-in f-full" id="am-${di}" placeholder="Google Maps 連結（選填）"/>
        </div>
        <div class="f-actions">
          <button class="btn btn-primary" onclick="addEv(${di})">新增</button>
          <button class="btn" onclick="hideAddEv(${di})">取消</button>
        </div>
      </div>
    </div>`;
  });
  updateStats();
}

function toggleEv(id) {
  const card = document.getElementById(id);
  card.classList.toggle('open');
}
function saveNote(id, val) {
  notes[id] = val;
  localStorage.setItem('trip_notes', JSON.stringify(notes));
}
function showAddEv(di) { document.getElementById('af-'+di).classList.add('show'); }
function hideAddEv(di) { document.getElementById('af-'+di).classList.remove('show'); }
function addEv(di) {
  const t = document.getElementById('at-'+di).value || '—';
  const n = document.getElementById('an-'+di).value;
  const y = document.getElementById('ay-'+di).value;
  const d = document.getElementById('ad-'+di).value;
  const m = document.getElementById('am-'+di).value;
  if (!n) return;
  const stored = JSON.parse(localStorage.getItem('added_items') || '{}');
  if (!stored[di]) stored[di] = [];
  stored[di].push({ time:t, name:n, type:y, desc:d, map:m });
  localStorage.setItem('added_items', JSON.stringify(stored));
  renderItinerary();
}

// ---- CHECKLIST ----
function renderChecklist() {
  const root = document.getElementById('checks-root');
  root.innerHTML = '';
  checkGroupsData.forEach((g, gi) => {
    const total = g.items.length;
    const done = g.items.filter((_, i) => checkState[g.id+'-'+i]).length;
    const itemsHTML = g.items.map((item, i) => {
      const key = g.id+'-'+i;
      const isDone = !!checkState[key];
      return `<div class="check-item">
        <input type="checkbox" class="check-cb" ${isDone?'checked':''} onchange="toggleCheck('${key}',this.checked)"/>
        <div class="check-text">
          <div class="check-label${isDone?' done':''}" id="cl-${key}">${item.text}</div>
          ${item.sub ? `<div class="check-sub-text">${item.sub}</div>` : ''}
        </div>
      </div>`;
    }).join('');
    const addedChecks = JSON.parse(localStorage.getItem('added_checks_'+g.id) || '[]');
    const addedHTML = addedChecks.map((text, i) => {
      const key = g.id+'-added-'+i;
      const isDone = !!checkState[key];
      return `<div class="check-item">
        <input type="checkbox" class="check-cb" ${isDone?'checked':''} onchange="toggleCheck('${key}',this.checked)"/>
        <div class="check-text"><div class="check-label${isDone?' done':''}" id="cl-${key}">${text}</div></div>
      </div>`;
    }).join('');
    root.innerHTML += `<div class="check-group">
      <div class="check-group-head">
        <span class="check-group-title">${g.title}</span>
        <span class="check-progress">${done}/${total}</span>
      </div>
      ${itemsHTML}${addedHTML}
      <div class="check-add-row">
        <input class="check-add-in" id="ci-${g.id}" placeholder="新增待辦..."/>
        <button class="btn btn-primary" onclick="addCheck('${g.id}')" style="font-size:12px;padding:6px 12px">新增</button>
      </div>
    </div>`;
  });
  updateStats();
}

function toggleCheck(key, val) {
  checkState[key] = val;
  localStorage.setItem('trip_checks', JSON.stringify(checkState));
  const lbl = document.getElementById('cl-'+key);
  if (lbl) lbl.classList.toggle('done', val);
  updateStats();
}
function addCheck(gid) {
  const inp = document.getElementById('ci-'+gid);
  if (!inp.value.trim()) return;
  const stored = JSON.parse(localStorage.getItem('added_checks_'+gid) || '[]');
  stored.push(inp.value.trim());
  localStorage.setItem('added_checks_'+gid, JSON.stringify(stored));
  inp.value = '';
  renderChecklist();
}

// ---- BUDGET ----
function renderBudget() {
  renderWallets();
  renderExpList();
  renderDashboard();
  renderWhoRow('who-row', 'selectedWho');
  renderWhoRow('scan-who-row', 'scanSelectedWho');
}

function renderWhoRow(rowId, stateVar) {
  const row = document.getElementById(rowId);
  if (!row) return;
  row.innerHTML = travelers.map(t => `
    <button class="who-btn${window[stateVar]===t.id?' selected':''}" 
      style="${window[stateVar]===t.id?`border-color:${t.color};background:${t.bg};color:${t.color}`:'color:var(--text2)'}"
      onclick="selectWho('${t.id}','${stateVar}','${rowId}')">
      <span style="width:18px;height:18px;border-radius:50%;background:${t.bg};border:1.5px solid ${t.color};display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:${t.color}">${t.name[0]}</span>
      ${t.name}
    </button>`).join('');
}

function selectWho(id, stateVar, rowId) {
  window[stateVar] = id;
  renderWhoRow(rowId, stateVar);
}

function renderWallets() {
  document.getElementById('wallets-root').innerHTML = wallets.map(w => {
    const bal = parseFloat(walletBals[w.id] || 0);
    const other = w.isJpy ? `≈ NT$${Math.round(bal*JPY_NTD).toLocaleString()}` : `≈ ¥${Math.round(bal*NTD_JPY).toLocaleString()}`;
    return `<div class="wallet-card">
      <div class="wallet-name">${w.label}</div>
      <div class="wallet-bal">${w.unit}${bal.toLocaleString()}</div>
      <div class="wallet-bal2">${other}</div>
      <div class="wallet-in-row">
        <input class="wallet-in" type="number" placeholder="設定餘額" value="${bal||''}" onchange="setWallet('${w.id}',this.value)"/>
        <span class="wallet-unit">${w.unit}</span>
      </div>
    </div>`;
  }).join('');
}

function setWallet(id, val) {
  walletBals[id] = parseFloat(val) || 0;
  localStorage.setItem('wallet_bals', JSON.stringify(walletBals));
  renderWallets();
}

function renderDashboard() {
  const totJpy = expenses.reduce((s,e) => s + e.jpy, 0);
  document.getElementById('dash-jpy').textContent = '¥' + totJpy.toLocaleString();
  document.getElementById('dash-ntd').textContent = '≈ NT$' + Math.round(totJpy*JPY_NTD).toLocaleString();
  const cats = {};
  expenses.forEach(e => { cats[e.cat] = (cats[e.cat]||0) + e.jpy; });
  document.getElementById('dash-cats').innerHTML = Object.entries(cats)
    .sort((a,b) => b[1]-a[1])
    .map(([cat, amt]) => `<div class="dash-cat">${cat} <span>¥${amt.toLocaleString()}</span></div>`)
    .join('');
}

function toggleExpForm() { document.getElementById('exp-form').classList.toggle('show'); }

function addExp(opts) {
  const name = opts ? opts.name : document.getElementById('ef-name').value;
  const amt = opts ? opts.amt : parseFloat(document.getElementById('ef-amt').value) || 0;
  const curr = opts ? opts.curr : document.getElementById('ef-curr').value;
  const cat = opts ? opts.cat : document.getElementById('ef-cat').value;
  const wallet = opts ? opts.wallet : document.getElementById('ef-wallet').value;
  const day = opts ? opts.day : parseInt(document.getElementById('ef-day').value) || 1;
  const who = opts ? opts.who : selectedWho;
  if (!name) return;
  const jpy = curr === 'JPY' ? amt : Math.round(amt * NTD_JPY);
  const ntd = curr === 'NTD' ? amt : Math.round(amt * JPY_NTD);
  expenses.push({ name, jpy, ntd, cat, wallet, day, who });
  localStorage.setItem('trip_expenses', JSON.stringify(expenses));
  if (!opts) {
    document.getElementById('ef-name').value = '';
    document.getElementById('ef-amt').value = '';
    document.getElementById('exp-form').classList.remove('show');
  }
  renderExpList();
  renderDashboard();
  updateStats();
}

function removeExp(i) {
  expenses.splice(i, 1);
  localStorage.setItem('trip_expenses', JSON.stringify(expenses));
  renderExpList();
  renderDashboard();
  updateStats();
}

function renderExpList() {
  const root = document.getElementById('exp-root');
  if (!expenses.length) {
    root.innerHTML = '<div class="empty"><div class="empty-icon">💴</div>還沒有費用記錄</div>';
    document.getElementById('total-row').style.display = 'none';
    return;
  }
  root.innerHTML = expenses.map((e, i) => {
    const t = travelers.find(t => t.id === e.who) || travelers[0];
    return `<div class="exp-card">
      <div class="exp-row">
        <div class="exp-avatar" style="background:${t.bg};color:${t.color}">${t.name[0]}</div>
        <div class="exp-mid">
          <div class="exp-name-row">
            <span class="exp-name">${e.name}</span>
            <span class="cat-tag ct-${e.cat}">${e.cat}</span>
          </div>
          <div class="exp-meta">第${e.day}天 · ${e.wallet} · ${t.name}</div>
        </div>
        <div class="exp-amts">
          <div class="exp-jpy">¥${e.jpy.toLocaleString()}</div>
          <div class="exp-ntd">NT$${e.ntd.toLocaleString()}</div>
        </div>
        <button class="exp-del" onclick="removeExp(${i})">×</button>
      </div>
    </div>`;
  }).join('');
  const totJpy = expenses.reduce((s,e) => s+e.jpy, 0);
  const totNtd = expenses.reduce((s,e) => s+e.ntd, 0);
  document.getElementById('total-jpy').textContent = '¥' + totJpy.toLocaleString();
  document.getElementById('total-ntd').textContent = '≈ NT$' + totNtd.toLocaleString();
  document.getElementById('total-row').style.display = 'flex';
}

// ---- STATS ----
function updateStats() {
  const todo = checkGroupsData.reduce((s,g) => {
    const added = JSON.parse(localStorage.getItem('added_checks_'+g.id)||'[]');
    const total = g.items.length + added.length;
    const done = g.items.filter((_,i)=>checkState[g.id+'-'+i]).length +
                 added.filter((_,i)=>checkState[g.id+'-added-'+i]).length;
    return s + (total - done);
  }, 0);
  document.getElementById('st-todo').textContent = todo;
  const totJpy = expenses.reduce((s,e)=>s+e.jpy,0);
  document.getElementById('st-paid').textContent = '¥' + totJpy.toLocaleString();
  document.getElementById('st-paid-ntd').textContent = 'NT$' + Math.round(totJpy*JPY_NTD).toLocaleString();
}

// ---- SCAN ----
function openScan() {
  document.getElementById('scan-modal').classList.add('show');
  document.getElementById('api-key-input').value = apiKey;
  if (!apiKey) document.getElementById('api-notice').style.display = 'block';
  renderWhoRow('scan-who-row', 'scanSelectedWho');
}
function closeScan() {
  document.getElementById('scan-modal').classList.remove('show');
  document.getElementById('scan-preview').style.display = 'none';
  document.getElementById('scan-result').style.display = 'none';
  document.getElementById('scan-add-section').style.display = 'none';
  document.getElementById('scan-close-row').style.display = 'flex';
  document.getElementById('scan-loading').style.display = 'none';
}
function saveApiKey() {
  apiKey = document.getElementById('api-key-input').value.trim();
  localStorage.setItem('anthropic_key', apiKey);
  document.getElementById('api-notice').style.display = apiKey ? 'none' : 'block';
  alert(apiKey ? 'API Key 已儲存 ✓' : '請輸入有效的 API Key');
}

async function handleScanFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    const dataUrl = e.target.result;
    const preview = document.getElementById('scan-preview');
    preview.src = dataUrl;
    preview.style.display = 'block';
    if (!apiKey) {
      document.getElementById('api-notice').style.display = 'block';
      prefillScanForm('', '', '食');
      return;
    }
    document.getElementById('scan-loading').style.display = 'block';
    document.getElementById('scan-close-row').style.display = 'none';
    try {
      const base64 = dataUrl.split(',')[1];
      const mimeType = file.type || 'image/jpeg';
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 300,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: mimeType, data: base64 } },
              { type: 'text', text: '這是一張日本收據。請用JSON回覆，只回JSON不要其他文字：{"shop":"店名（翻譯成繁體中文）","amount":金額數字只要日幣合計,"category":"食或樂或住或行或用品或禮其中一個"}' }
            ]
          }]
        })
      });
      const data = await res.json();
      const text = data.content?.[0]?.text || '';
      const clean = text.replace(/```json|```/g,'').trim();
      const parsed = JSON.parse(clean);
      document.getElementById('sr-shop').textContent = parsed.shop || '—';
      document.getElementById('sr-amt').textContent = parsed.amount ? '¥' + parsed.amount : '—';
      document.getElementById('sr-cat').textContent = parsed.category || '食';
      document.getElementById('scan-result').style.display = 'block';
      prefillScanForm(parsed.shop || '', parsed.amount || '', parsed.category || '食');
    } catch(err) {
      prefillScanForm('', '', '食');
    }
    document.getElementById('scan-loading').style.display = 'none';
    document.getElementById('scan-close-row').style.display = 'flex';
  };
  reader.readAsDataURL(file);
}

function prefillScanForm(name, amt, cat) {
  document.getElementById('sf-name').value = name;
  document.getElementById('sf-amt').value = amt;
  const catSel = document.getElementById('sf-cat');
  for (let i = 0; i < catSel.options.length; i++) {
    if (catSel.options[i].value === cat || catSel.options[i].text === cat) { catSel.selectedIndex = i; break; }
  }
  document.getElementById('scan-add-section').style.display = 'block';
}

function saveScanExp() {
  const name = document.getElementById('sf-name').value;
  const amt = parseFloat(document.getElementById('sf-amt').value) || 0;
  const cat = document.getElementById('sf-cat').value;
  const wallet = document.getElementById('sf-wallet').value;
  const day = parseInt(document.getElementById('sf-day').value) || 1;
  if (!name) return;
  addExp({ name, amt, curr:'JPY', cat, wallet, day, who: scanSelectedWho });
  closeScan();
}

renderItinerary();
renderChecklist();
